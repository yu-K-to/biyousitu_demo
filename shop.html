<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIÈRE Salon - Premium Shop</title>
  <style>
    :root {
      --primary: #c9a55c;       /* Premium Gold */
      --primary-hover: #b38f4d;
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-light: #7a7a7a;
      --border: #e6e6e6;
      --bg-dark: #121212;
      --text-dark: #f0f0f0;
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Navbar */
    header {
      background: var(--card-bg);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }
    .brand {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--text);
      text-decoration: none;
    }
    .cart-btn {
      position: relative;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text);
      padding: 8px;
    }
    .cart-badge {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      width: 18px;
      height: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      transform: scale(0);
      transition: transform 0.3s ease;
    }
    .cart-badge.active {
      transform: scale(1);
    }

    /* Hero Section */
    .hero {
      height: 40vh;
      background: url('https://images.unsplash.com/photo-1522337660859-02fbefca4702?q=80&w=2069&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.3);
    }
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
    }
    .hero h1 {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    /* Main Container */
    main {
      padding: 60px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .section-title {
      font-size: 24px;
      font-weight: 300;
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 32px;
    }
    .product-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }
    .img-container {
      width: 100%;
      padding-top: 100%; /* 1:1 Aspect Ratio */
      position: relative;
      overflow: hidden;
      background: #f0f0f0;
    }
    .product-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .product-card:hover .product-img {
      transform: scale(1.05);
    }
    .product-info {
      padding: 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .product-category {
      font-size: 11px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .product-name {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 12px;
      flex-grow: 1;
    }
    .product-price {
      font-size: 18px;
      font-weight: 300;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .add-btn {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .add-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
    }
    .add-btn:hover::after {
      width: 300px;
      height: 300px;
    }

    /* Cart Drawer */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 90;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }
    .overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      max-width: 400px;
      height: 100%;
      background: var(--card-bg);
      z-index: 100;
      box-shadow: -10px 0 30px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      flex-direction: column;
    }
    .cart-drawer.active {
      transform: translateX(0);
    }
    .cart-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cart-header h2 {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 1px;
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-light);
      transition: color 0.2s;
    }
    .close-btn:hover {
      color: var(--text);
    }
    .cart-items {
      flex-grow: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .cart-empty {
      text-align: center;
      padding: 40px 0;
      color: var(--text-light);
      font-size: 14px;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .cart-item-img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: #f0f0f0;
    }
    .cart-item-details {
      flex-grow: 1;
    }
    .cart-item-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .cart-item-price {
      font-size: 14px;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .qty-btn:hover {
      border-color: var(--text);
      background: var(--text);
      color: #fff;
    }
    .qty-val {
      font-size: 14px;
      font-weight: 500;
      width: 20px;
      text-align: center;
    }
    .cart-footer {
      padding: 24px;
      border-top: 1px solid var(--border);
      background: #fdfdfd;
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 18px;
      font-weight: 500;
    }
    .checkout-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .checkout-btn:hover {
      background: var(--primary-hover);
    }
    .checkout-btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

    /* Modal for checkout success */
    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      z-index: 110;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 500px;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal.active {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }
    .modal-icon {
      font-size: 48px;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .modal h3 {
      font-size: 24px;
      font-weight: 300;
      margin-bottom: 12px;
    }
    .modal p {
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .modal-btn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .modal-btn-outline {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    /* Confirm List */
    .confirm-list {
      text-align: left;
      margin-bottom: 24px;
      background: #fdfdfd;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .confirm-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed var(--border);
      padding: 8px 0;
      font-size: 14px;
    }
    .confirm-item:last-child {
      border-bottom: none;
    }
    .confirm-total {
      font-size: 18px;
      font-weight: bold;
      color: var(--primary);
      text-align: right;
      margin-top: 16px;
    }

    /* Product card add section */
    .add-section {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }
    .qty-select {
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      color: var(--text);
    }
    .add-btn {
      flex: 1;
      padding: 14px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .add-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
    }
    .add-btn:hover::after {
      width: 300px;
      height: 300px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header>
    <a href="#" class="brand">LUMIÈRE</a>
    <button class="cart-btn" onclick="toggleCart()">
      🛒
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </header>

  <!-- Hero Section -->
  <div class="hero">
    <div class="hero-content">
      <h1>SALON QUALITY</h1>
      <p>美容室の仕上がりをご自宅で</p>
    </div>
  </div>

  <!-- Main Content -->
  <main>
    <h2 class="section-title">PRODUCTS</h2>
    <div class="product-grid" id="productGrid">
      <!-- Products will be generated here -->
    </div>
  </main>

  <!-- Cart Overlay & Drawer -->
  <div class="overlay" id="overlay" onclick="toggleCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>YOUR CART</h2>
      <button class="close-btn" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItemsContainer">
      <!-- Cart items will be generated here -->
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>TOTAL</span>
        <span id="cartTotalPrice">¥0</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn" onclick="processCheckout()" disabled>
        購入手続きに進む
      </button>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal" id="confirmModal">
    <h3>ご注文の最終確認</h3>
    <p>以下の内容で注文を確定してよろしいでしょうか？</p>
    <div class="confirm-list" id="confirmList">
      <!-- To be filled by JS -->
    </div>
    <div class="confirm-total" id="confirmTotal"></div>
    <button class="modal-btn" onclick="submitOrder()">注文を確定する</button>
    <button class="modal-btn-outline" onclick="closeConfirmModal()">戻る</button>
  </div>

  <!-- Success Modal -->
  <div class="modal" id="successModal">
    <div class="modal-icon">✨</div>
    <h3>Thank You!</h3>
    <p>ご注文が完了いたしました。<br>商品の到着まで今しばらくお待ちください。</p>
    <button class="modal-btn" onclick="closeModal()">買い物を続ける</button>
  </div>

  <script>
    // Product Data
    const products = [
      {
        id: 'p1',
        name: 'LUMIÈRE Moisture Shampoo',
        category: 'Shampoo',
        price: 3800,
        image: 'https://images.unsplash.com/photo-1599305090598-fe179d501227?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p2',
        name: 'LUMIÈRE Repair Treatment',
        category: 'Treatment',
        price: 4200,
        image: 'https://images.unsplash.com/photo-1556228578-0d85b1a4d571?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p3',
        name: 'Botanical Hair Oil',
        category: 'Hair Care',
        price: 3200,
        image: 'https://images.unsplash.com/photo-1608248593842-8021c6a1faeb?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p4',
        name: 'Organic Scalp Serum',
        category: 'Scalp Care',
        price: 5500,
        image: 'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p5',
        name: 'Natural Styling Wax',
        category: 'Styling',
        price: 2400,
        image: 'https://images.unsplash.com/photo-1596460105822-e2dca9c5ee96?q=80&w=800&auto=format&fit=crop'
      },
      {
        id: 'p6',
        name: 'Premium Hair Mask',
        category: 'Special Care',
        price: 4800,
        image: 'https://images.unsplash.com/photo-1629198688000-71f23e745b6e?q=80&w=800&auto=format&fit=crop'
      }
    ];

    // Cart State
    let cart = [];

    // Initialize
    function init() {
      renderProducts();
      loadCart();
      updateCartUI();
    }

    // Render Products
    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="img-container">
            <img src="${p.image}" alt="${p.name}" class="product-img">
          </div>
          <div class="product-info">
            <div class="product-category">${p.category}</div>
            <h3 class="product-name">${p.name}</h3>
            <div class="product-price">¥${p.price.toLocaleString()}</div>
            <div class="add-section">
              <select class="qty-select" id="qty-${p.id}">
                <option value="1">1個</option>
                <option value="2">2個</option>
                <option value="3">3個</option>
                <option value="4">4個</option>
                <option value="5">5個</option>
              </select>
              <button class="add-btn" onclick="addToCart('${p.id}')">カートに追加</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Add to Cart
    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      const existingItem = cart.find(item => item.id === productId);
      const selectEl = document.getElementById(`qty-${productId}`);
      const qtyToAdd = selectEl ? parseInt(selectEl.value) : 1;

      if (existingItem) {
        existingItem.quantity += qtyToAdd;
      } else {
        cart.push({ ...product, quantity: qtyToAdd });
      }

      saveCart();
      updateCartUI();
      
      // Reset select
      if (selectEl) selectEl.value = "1";

      // Visual feedback: briefly show cart then hide, or just bounce icon
      const badge = document.getElementById('cartBadge');
      badge.style.transform = 'scale(1.5)';
      setTimeout(() => badge.style.transform = 'scale(1)', 300);
    }

    // Update Quantity
    function updateQty(productId, delta) {
      const item = cart.find(i => i.id === productId);
      if (!item) return;

      item.quantity += delta;
      
      if (item.quantity <= 0) {
        cart = cart.filter(i => i.id !== productId);
      }

      saveCart();
      updateCartUI();
    }

    // Update Cart UI
    function updateCartUI() {
      const container = document.getElementById('cartItemsContainer');
      const totalEl = document.getElementById('cartTotalPrice');
      const badge = document.getElementById('cartBadge');
      const checkoutBtn = document.getElementById('checkoutBtn');

      // Update Badge
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      badge.innerText = totalItems;
      if (totalItems > 0) {
        badge.classList.add('active');
        checkoutBtn.disabled = false;
      } else {
        badge.classList.remove('active');
        checkoutBtn.disabled = true;
      }

      // Calculate Total
      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      totalEl.innerText = `¥${totalPrice.toLocaleString()}`;

      // Render Items
      if (cart.length === 0) {
        container.innerHTML = '<div class="cart-empty">カートに商品はありません。</div>';
        return;
      }

      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" class="cart-item-img">
          <div class="cart-item-details">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">¥${item.price.toLocaleString()}</div>
            <div class="cart-item-qty">
              <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
              <span class="qty-val">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Toggle Cart Drawer
    function toggleCart() {
      const drawer = document.getElementById('cartDrawer');
      const overlay = document.getElementById('overlay');
      drawer.classList.toggle('active');
      overlay.classList.toggle('active');
    }

    // Checkout processing mock
    function processCheckout() {
      if (cart.length === 0) return;
      
      // Build confirmation list
      const confirmList = document.getElementById('confirmList');
      confirmList.innerHTML = cart.map(item => `
        <div class="confirm-item">
          <span>${item.name} × ${item.quantity}</span>
          <span>¥${(item.price * item.quantity).toLocaleString()}</span>
        </div>
      `).join('');

      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById('confirmTotal').innerText = `合計: ¥${totalPrice.toLocaleString()}`;

      // Show Confirm Modal, Hide cart drawer
      const drawer = document.getElementById('cartDrawer');
      drawer.classList.remove('active');
      document.getElementById('confirmModal').classList.add('active');
      document.getElementById('overlay').classList.add('active');
    }

    function closeConfirmModal() {
      document.getElementById('confirmModal').classList.remove('active');
      // show cart drawer back
      document.getElementById('cartDrawer').classList.add('active');
    }

    function submitOrder() {
      // Fake checkout processing delay
      const btn = document.querySelector('#confirmModal .modal-btn');
      const originalText = btn.innerText;
      btn.innerText = '処理中...';
      btn.disabled = true;

      setTimeout(() => {
        // Clear cart
        cart = [];
        saveCart();
        updateCartUI();
        
        // Hide confirm modal, show success modal
        document.getElementById('confirmModal').classList.remove('active');
        document.getElementById('successModal').classList.add('active');

        // Restore button state
        btn.innerText = originalText;
        btn.disabled = false;
      }, 1500);
    }

    function closeModal() {
      document.getElementById('successModal').classList.remove('active');
      document.getElementById('overlay').classList.remove('active');
    }

    // Local Storage Utilities
    function saveCart() {
      localStorage.setItem('lumiere_cart', JSON.stringify(cart));
    }

    function loadCart() {
      const saved = localStorage.getItem('lumiere_cart');
      if (saved) {
        try {
          cart = JSON.parse(saved);
        } catch(e) {
          cart = [];
        }
      }
    }

    // Run
    init();
  </script>
</body>
</html>
